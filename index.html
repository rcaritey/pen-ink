<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pen &amp; Ink — Practical AI Tools for Local Businesses</title>
  <meta name="description" content="Practical AI tools for local businesses and nonprofits. Thoughtful UI/UX for the people who actually use them." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #1a1a1a;
      --paper: #f5f1ea;
      --paper-deep: #ede7dc;
      --rule: #1a1a1a;
      --accent: #8b3a3a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    /* Subtle paper texture via gradient */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(at 20% 30%, rgba(139, 58, 58, 0.04) 0%, transparent 50%),
        radial-gradient(at 80% 70%, rgba(26, 26, 26, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.06;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0;
      animation: fadeIn 0.8s 0.1s forwards;
    }

    .header-left {
      font-family: 'Libre Caslon Text', serif;
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      font-size: 0.9rem;
    }

    .header-right {
      display: flex;
      gap: 1.5rem;
    }

    .header-right span {
      opacity: 0.7;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 8vw, 6rem) 0;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeIn 0.8s 0.3s forwards;
    }

    .eyebrow::before {
      content: "";
      width: 2.5rem;
      height: 1px;
      background: var(--ink);
    }

    .wordmark {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 12vw, 9rem);
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 2rem;
      opacity: 0;
      animation: rise 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .wordmark .amp {
      font-style: italic;
      font-weight: 400;
      display: inline-block;
    }

    .tagline {
      font-family: 'Libre Caslon Text', serif;
      font-weight: 400;
      font-size: clamp(1.25rem, 2.8vw, 2rem);
      line-height: 1.3;
      max-width: 38ch;
      margin-bottom: 1rem;
      opacity: 0;
      animation: rise 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .subtag {
      font-family: 'Libre Caslon Text', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      line-height: 1.4;
      max-width: 42ch;
      color: var(--ink);
      opacity: 0;
      animation: rise 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.8s 1.3s forwards;
    }

    .contact-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 0.5rem;
    }

    .contact a {
      font-family: 'Libre Caslon Text', serif;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }

    .contact a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .meta {
      text-align: right;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      line-height: 1.8;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .header-right span:first-child {
        display: none;
      }
      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
      .meta {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-left">Pen &amp; Ink</div>
      <div class="header-right">
        <span>Toronto</span>
        <span>Est. 2025</span>
      </div>
    </header>

    <main class="main">
      <h1 class="wordmark">
        Pen <span class="amp">&amp;</span> Ink
      </h1>

      <p class="tagline">
        Practical AI tools for local businesses and nonprofits.
      </p>

      <p class="subtag">
        Thoughtful UI/UX for the people who actually use them.
      </p>
    </main>

    <footer class="footer">
      <div class="contact">
        <div class="contact-label">Get in touch</div>
        <a href="mailto:hello@pen-ink.ca">hello@pen-ink.ca</a>
      </div>
      <div class="meta">
        <div>Built in Toronto</div>
      </div>
    </footer>
  </div>
</body>
</html>
